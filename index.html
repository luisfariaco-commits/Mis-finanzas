<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Finance Master v13</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }

        /* ESTILOS SEGÚN DOCUMENTO OFICIAL */
        .cat-principal-estilo { 
            background-color: #fef08a; /* Amarillo */
            text-decoration: underline; 
            font-weight: 800; 
            color: black; 
            text-transform: uppercase;
        }
        
        .cat-secundaria-estilo { 
            color: #1d4ed8 !important; /* Azul */
            font-weight: 700;
        }
        
        .sub-categoria-estilo { 
            color: black !important; 
            font-size: 11px !important; 
            text-transform: uppercase;
            font-weight: 600;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .active-nav { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        details > summary { list-style: none; outline: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl">
        <div class="max-w-4xl mx-auto px-6 py-5">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-black tracking-tighter text-indigo-400 italic">ELITE FINANCE PRO</h1>
                <div class="flex gap-2">
                    <button onclick="exportarExcel()" class="bg-white/10 p-2 rounded-lg text-xs"><i class="fas fa-file-export"></i></button>
                    <button onclick="borrarBD()" class="bg-red-500/10 p-2 rounded-lg text-xs text-red-400"><i class="fas fa-sync"></i></button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div onclick="abrirDrillDown('patrimonio')" class="bg-white/5 border border-white/10 p-4 rounded-2xl cursor-pointer active:scale-95 transition">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Patrimonio Neto <i class="fas fa-search-plus ml-1"></i></p>
                    <p id="kpi-patrimonio" class="text-2xl font-black text-indigo-300">$0.00</p>
                </div>
                <div onclick="abrirDrillDown('deudas')" class="bg-white/5 border border-white/10 p-4 rounded-2xl cursor-pointer active:scale-95 transition">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Deuda Total <i class="fas fa-search-plus ml-1"></i></p>
                    <p id="kpi-deuda" class="text-2xl font-black text-amber-400">$0.00</p>
                </div>
            </div>
        </div>

        <nav class="bg-white flex justify-around border-b border-slate-200">
            <button onclick="irTab('tab-resumen', this)" class="nav-btn py-4 px-2 text-[10px] font-bold uppercase active-nav">Resumen</button>
            <button onclick="irTab('tab-registro', this)" class="nav-btn py-4 px-2 text-[10px] font-bold uppercase text-slate-400">Registrar</button>
            <button onclick="irTab('tab-activos', this)" class="nav-btn py-4 px-2 text-[10px] font-bold uppercase text-slate-400">Activos</button>
            <button onclick="irTab('tab-historial', this)" class="nav-btn py-4 px-2 text-[10px] font-bold uppercase text-slate-400">Historial</button>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-4">

        <div id="tab-resumen" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center">Ingresos</h3>
                    <div class="h-44"><canvas id="chartIng"></canvas></div>
                </div>
                <div class="bg-white p-5 rounded-3xl border shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center">Gastos</h3>
                    <div class="h-44"><canvas id="chartGas"></canvas></div>
                </div>
            </div>

            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <details open>
                    <summary class="flex justify-between items-center p-6 cursor-pointer bg-slate-800 text-white">
                        <span class="font-black text-xs uppercase">Flujo Mensual</span>
                        <span id="kpi-flujo" class="font-black text-xl">$0.00</span>
                    </summary>
                    <div id="contenedor-flujo" class="p-4 space-y-3 bg-slate-50"></div>
                </details>
            </div>
        </div>

        <div id="tab-registro" class="tab-content">
            <div class="bg-white p-8 rounded-3xl border shadow-xl max-w-lg mx-auto">
                <h2 class="text-center font-black text-slate-800 uppercase mb-6">Nuevo Registro</h2>
                <form id="form-mov" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="f-fecha" class="p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm" required>
                        <input type="number" id="f-monto" step="0.01" class="p-4 bg-slate-50 border rounded-2xl outline-none font-black text-indigo-600 text-lg" placeholder="0.00" required>
                    </div>
                    <select id="f-cat" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-xs" required></select>
                    <input type="text" id="f-nota" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" placeholder="Comentario opcional">
                    <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-indigo-600 transition">Guardar Movimiento</button>
                </form>
            </div>
        </div>

        <div id="tab-activos" class="tab-content space-y-4">
            <div id="grid-act" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <button onclick="addActivo()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-lg">+ Nuevo Activo Fijo</button>
        </div>

        <div id="tab-historial" class="tab-content">
            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <div id="lista-hist" class="divide-y divide-slate-100"></div>
            </div>
        </div>

    </main>

    <div id="modal-box" class="fixed inset-0 bg-slate-900/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="font-black text-xs uppercase text-slate-400">Desglose</h3>
                <button onclick="cerrarModal()" class="text-slate-300 hover:text-red-500"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            <div id="modal-content" class="p-6 max-h-[60vh] overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <script>
        // ESTRUCTURA COMPLETA BASADA EN TU DOCUMENTO [cite: 5-106]
        const ESTRUCTURA = {
            "INGRESOS": {
                "PRINCIPAL": ["INGRESOS MENSUALES ADULTO 1", "INGRESOS MENSUALES ADULTO 2", "BONOS/REGALOS", "INGRESOS POR VENTAS"]
            },
            "GASTOS": {
                "GASTOS DEL INMUEBLE 1": ["HIPOTECA", "IMPUESTOS", "ADMINISTRACIÓN", "MANTENIMIENTO", "OTROS"],
                "GASTOS DEL INMUEBLE 2": ["HIPOTECA", "IMPUESTOS", "ADMINISTRACIÓN", "MANTENIMIENTO", "OTROS"],
                "SERVICIOS": ["ELECTRICIDAD", "AGUA", "GAS", "TELEFONOS", "APP O SUSCRIPCIONES", "INTERNET / TV", "OTROS"],
                "ALIMENTACIÓN": ["MERCADOS", "RESTAURANTES", "GASTOS DIARIOS CAFÉ/MERIENDA", "CIGARRILLOS", "OTROS"],
                "TRANSPORTE": ["BUSES/TRENES", "CUOTA AUTOMÓVIL 1", "CUOTA AUTOMÓVIL 2", "GASOLINA", "PEAJES", "IMPUESTOS", "MANTENIMIENTO", "SEGUROS", "PARQUEADORES", "OTROS"],
                "HIJOS": ["COLEGIOS", "MATRÍCULAS ESCOLARES", "ACTIVIDADES EXTRA", "MESADA", "ÚTILES ESCOLARES", "REGALOS Y FIESTAS", "CLASES EXTRA", "TERAPIAS/OTROS", "AYUDA DOMÉSTICA", "TRANSPORTE ESCOLAR", "VIAJES ESCOLARES", "CUOTA ALIMENTARIA (SI APLICA)", "OTROS"],
                "EDUCACIÓN ADULTOS": ["GENERAL"],
                "SALUD": ["SEGURO MÉDICO", "DENTISTA", "MEDICINAS", "PAGOS NO CUBIERTOS POR SEGURO", "OTROS"],
                "MASCOTAS": ["SEGURO", "COMIDA", "CUIDADOS", "OTROS"],
                "VESTUARIO": ["UNIFORMES HIJOS", "ROPA HIJOS", "ROPA ADULTOS", "IMPLEMENTOS DEPORTIVOS", "SALÓN DE BELLEZA", "PELUQUERÍA", "COSMÉTICOS", "OTROS"],
                "OTROS GASTOS": ["REGALOS", "FIESTAS Y CELEBRACIONES", "VACACIONES", "SALIDAS FIN DE SEMANA", "AYUDA A PARIENTES", "DONACIONES", "HOBBIES/PASATIEMPOS", "GASTOS MISCELÁNEOS"],
                "OTROS SEGUROS": ["SEGURO MÉDICO", "SEGURO DENTÍSTA", "SEGURO DE VIDA", "SEGURO MORTUORIO", "OTROS SEGUROS"],
                "DEUDAS": ["TARJETA DE CRÉDITO 1", "TARJETA DE CRÉDITO 2", "TARJETA DE CRÉDITO 3", "OTRA DEUDA 1", "OTRA DEUDA 2", "DEUDAS FAMILIARES", "DEUDA CON LA EMPRESA", "CRÉDITO DE EDUCACIÓN"]
            }
        };

        let db = JSON.parse(localStorage.getItem('elite_db_v13')) || {
            movs: [],
            activos: [
                { n: "INMUEBLE 1", v: 0, d: 0 },
                { n: "INMUEBLE 2", v: 0, d: 0 },
                { n: "AUTO 1", v: 0, d: 0 }
            ]
        };

        let myCharts = {};

        function irTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active-nav');
                b.classList.add('text-slate-400');
            });
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-nav');
            btn.classList.remove('text-slate-400');
            actualizar();
        }

        function actualizar() {
            let tIng = 0, tGas = 0, tVal = 0, tDeu = 0;
            const dataI = {}, dataG = {};

            db.movs.forEach(m => {
                const [p, s, sub] = m.path.split('|');
                if(p === "INGRESOS") { tIng += m.val; dataI[s] = (dataI[s] || 0) + m.val; }
                else { tGas += m.val; dataG[s] = (dataG[s] || 0) + m.val; }
            });
            db.activos.forEach(a => { tVal += a.v; tDeu += a.d; });

            // Dashboard
            const flujo = tIng - tGas;
            document.getElementById('kpi-patrimonio').innerText = `$${(tVal - tDeu + flujo).toLocaleString()}`;
            document.getElementById('kpi-deuda').innerText = `$${tDeu.toLocaleString()}`;
            document.getElementById('kpi-flujo').innerText = `$${flujo.toLocaleString()}`;
            document.getElementById('kpi-flujo').className = flujo >= 0 ? 'font-black text-xl text-emerald-400' : 'font-black text-xl text-red-400';

            // Gráficos
            renderCharts(dataI, dataG);

            // Flujo Lista
            const flowCont = document.getElementById('contenedor-flujo');
            flowCont.innerHTML = '';
            for(let p in ESTRUCTURA) {
                const totalP = db.movs.filter(m => m.path.startsWith(p)).reduce((a,b) => a+b.val, 0);
                let html = `<div class="cat-principal-estilo p-3 rounded-lg mb-2 shadow-sm">${p} - Total: $${totalP.toLocaleString()}</div>`;
                for(let s in ESTRUCTURA[p]) {
                    const totalS = db.movs.filter(m => m.path.includes(`|${s}|`)).reduce((a,b) => a+b.val, 0);
                    html += `
                    <details class="ml-2 mb-2 bg-white rounded-xl border overflow-hidden">
                        <summary class="cat-secundaria-estilo p-3 flex justify-between cursor-pointer hover:bg-slate-50">
                            <span>${s}</span>
                            <span class="font-black">$${totalS.toLocaleString()}</span>
                        </summary>
                        <div class="p-3 bg-slate-50/50 space-y-2">
                            ${ESTRUCTURA[p][s].map(sub => {
                                const totalSub = db.movs.filter(m => m.path.endsWith(`|${sub}`)).reduce((a,b) => a+b.val, 0);
                                return `<div class="sub-categoria-estilo flex justify-between border-b border-white pb-1">
                                    <span>${sub}</span><span>$${totalSub.toLocaleString()}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </details>`;
                }
                flowCont.innerHTML += html;
            }

            // Activos
            document.getElementById('grid-act').innerHTML = db.activos.map((a, i) => `
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 mb-4 uppercase tracking-widest">${a.n}</p>
                    <div class="space-y-3">
                        <div class="flex justify-between text-xs font-bold"><span>VALOR</span><input type="number" value="${a.v}" onchange="upAct(${i},'v',this.value)" class="w-24 text-right bg-slate-50 rounded p-1"></div>
                        <div class="flex justify-between text-xs font-bold text-red-500"><span>DEUDA</span><input type="number" value="${a.d}" onchange="upAct(${i},'d',this.value)" class="w-24 text-right bg-slate-50 rounded p-1"></div>
                        <div class="pt-2 border-t flex justify-between font-black"><span>NETO</span><span class="text-indigo-600">$${(a.v-a.d).toLocaleString()}</span></div>
                    </div>
                </div>`).join('');

            // Historial
            document.getElementById('lista-hist').innerHTML = db.movs.slice(0, 30).map((m, i) => `
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">${m.fecha}</p>
                        <p class="font-bold text-xs">${m.path.split('|')[2]}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${m.path.startsWith('ING') ? 'text-emerald-500' : 'text-red-500'}">$${m.val.toLocaleString()}</p>
                        <button onclick="delMov(${i})" class="text-[8px] font-bold text-slate-300 hover:text-red-500 uppercase">Eliminar</button>
                    </div>
                </div>`).join('');

            // Select Registro
            const sel = document.getElementById('f-cat');
            if(sel.innerHTML === "") {
                for(let p in ESTRUCTURA) {
                    for(let s in ESTRUCTURA[p]) {
                        ESTRUCTURA[p][s].forEach(sub => {
                            let o = document.createElement('option');
                            o.value = `${p}|${s}|${sub}`;
                            o.textContent = `${p} > ${s} > ${sub}`;
                            sel.appendChild(o);
                        });
                    }
                }
            }
        }

        function renderCharts(di, dg) {
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' };
            if(myCharts.i) myCharts.i.destroy();
            if(myCharts.g) myCharts.g.destroy();
            myCharts.i = new Chart(document.getElementById('chartIng'), { type: 'doughnut', data: { labels: Object.keys(di), datasets: [{ data: Object.values(di), backgroundColor: ['#4f46e5','#818cf8','#a5b4fc'] }] }, options: opt });
            myCharts.g = new Chart(document.getElementById('chartGas'), { type: 'doughnut', data: { labels: Object.keys(dg), datasets: [{ data: Object.values(dg), backgroundColor: ['#ef4444','#f87171','#fb923c','#fbbf24','#fcd34d','#4f46e5','#818cf8'] }] }, options: opt });
        }

        document.getElementById('form-mov').onsubmit = (e) => {
            e.preventDefault();
            db.movs.unshift({
                fecha: document.getElementById('f-fecha').value,
                val: parseFloat(document.getElementById('f-monto').value),
                path: document.getElementById('f-cat').value,
                nota: document.getElementById('f-nota').value
            });
            save();
            document.getElementById('form-mov').reset();
            setHoy();
            irTab('tab-resumen', document.querySelector('.nav-btn'));
        };

        function upAct(i, p, v) { db.activos[i][p] = parseFloat(v) || 0; save(); }
        function addActivo() { const n = prompt("Nombre:"); if(n) { db.activos.push({n: n.toUpperCase(), v: 0, d: 0}); save(); } }
        function delMov(i) { if(confirm("¿Borrar?")) { db.movs.splice(i, 1); save(); } }
        function save() { localStorage.setItem('elite_db_v13', JSON.stringify(db)); actualizar(); }
        function setHoy() { document.getElementById('f-fecha').valueAsDate = new Date(); }
        function borrarBD() { if(confirm("¿Resetear?")) { localStorage.clear(); location.reload(); } }

        function abrirDrillDown(tipo) {
            document.getElementById('modal-box').classList.remove('hidden');
            const cont = document.getElementById('modal-content');
            cont.innerHTML = '';
            if(tipo === 'patrimonio') {
                document.getElementById('modal-title').innerText = "Desglose Activos";
                db.activos.forEach(a => cont.innerHTML += `<div class="flex justify-between border-b pb-2 text-sm font-bold"><span>${a.n}</span><span class="text-indigo-600">$${(a.v-a.d).toLocaleString()}</span></div>`);
            } else {
                document.getElementById('modal-title').innerText = "Desglose Deudas";
                db.activos.filter(a => a.d > 0).forEach(a => cont.innerHTML += `<div class="flex justify-between border-b pb-2 text-sm font-bold"><span>${a.n}</span><span class="text-red-500">$${a.d.toLocaleString()}</span></div>`);
            }
        }

        function cerrarModal() { document.getElementById('modal-box').classList.add('hidden'); }
        
        function exportarExcel() {
            let csv = "\uFEFFFecha,Categoría,Subcategoría,Monto\n";
            db.movs.forEach(m => { const p = m.path.split('|'); csv += `${m.fecha},${p[1]},${p[2]},${m.val}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Elite_Finance_Report.csv";
            link.click();
        }

        setHoy();
        actualizar();
    </script>
</body>
</html>
