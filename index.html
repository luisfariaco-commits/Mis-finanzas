<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Finance v9 | Estructura Oficial</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Estilos del Documento Word Oficial */
        .cat-principal { background-color: #fef08a; text-decoration: underline; font-weight: 800; color: black; text-transform: uppercase; }
        .cat-secundaria { color: #1d4ed8; font-weight: 600; font-size: 0.9rem; }
        .sub-categoria { color: black; font-size: 11px; text-transform: uppercase; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active-nav { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-lg font-black tracking-tighter text-indigo-400">ELITE FINANCE <span class="text-white text-[10px] ml-2 px-2 py-0.5 bg-indigo-600 rounded">V9</span></h1>
                <div class="flex gap-2">
                    <button onclick="exportarDatos()" class="bg-white/10 p-2 rounded-lg text-xs"><i class="fas fa-file-export"></i></button>
                    <button onclick="borrarTodo()" class="bg-red-500/20 p-2 rounded-lg text-xs text-red-400"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Patrimonio Neto</p>
                    <p id="total-patrimonio" class="text-lg font-black text-indigo-300">$0.00</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-emerald-400">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Ingresos Mes</p>
                    <p id="total-ingresos" class="text-lg font-black">$0.00</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-red-400">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Gastos Mes</p>
                    <p id="total-gastos" class="text-lg font-black">$0.00</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-amber-400">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Deudas Acum.</p>
                    <p id="total-deuda" class="text-lg font-black">$0.00</p>
                </div>
            </div>
        </div>

        <nav class="bg-white flex justify-around border-b border-slate-200 shadow-sm">
            <button onclick="showTab('tab-dash')" id="nav-tab-dash" class="py-3 px-2 text-[10px] font-bold uppercase tracking-tighter text-slate-400 active-nav">Resumen</button>
            <button onclick="showTab('tab-reg')" id="nav-tab-reg" class="py-3 px-2 text-[10px] font-bold uppercase tracking-tighter text-slate-400">Registrar</button>
            <button onclick="showTab('tab-act')" id="nav-tab-act" class="py-3 px-2 text-[10px] font-bold uppercase tracking-tighter text-slate-400">Patrimonio</button>
            <button onclick="showTab('tab-hist')" id="nav-tab-hist" class="py-3 px-2 text-[10px] font-bold uppercase tracking-tighter text-slate-400">Historial</button>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-4">

        <div id="tab-dash" class="tab-content active space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="text-xs font-black uppercase text-slate-400">Flujo Mensual</h3>
                    <span id="flujo-mes" class="font-black text-xl">$0.00</span>
                </div>
                <div id="resumen-estructura" class="space-y-4 max-h-[60vh] overflow-y-auto custom-scroll pr-2">
                    </div>
            </div>
        </div>

        <div id="tab-reg" class="tab-content max-w-xl mx-auto">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-black text-slate-800 mb-6 uppercase">Nuevo Registro</h2>
                <form id="form-registro" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="reg-fecha" class="p-3 bg-slate-50 border rounded-xl outline-none text-sm" required>
                        <input type="number" id="reg-monto" step="0.01" class="p-3 bg-slate-50 border rounded-xl outline-none font-black text-indigo-600" placeholder="0.00" required>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Subcategoría (Nivel 3)</label>
                        <select id="reg-cat" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-xs font-bold" required></select>
                    </div>

                    <input type="text" id="reg-nota" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm" placeholder="Comentario (Ej: Mercado de la quincena)">
                    
                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-600 transition uppercase tracking-widest text-xs">Guardar Movimiento</button>
                </form>
            </div>
        </div>

        <div id="tab-act" class="tab-content space-y-6">
            <div id="grid-activos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <button onclick="agregarActivo()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black text-xs uppercase">+ Registrar Nuevo Activo Fijo</button>
        </div>

        <div id="tab-hist" class="tab-content">
            <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-50 font-black text-slate-400 uppercase border-b">
                        <tr><th class="p-4">Fecha</th><th class="p-4">Detalle</th><th class="p-4 text-right">Monto</th></tr>
                    </thead>
                    <tbody id="lista-movimientos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // DATA BASE OFICIAL SEGÚN WORD [cite: 1-106]
        const ESTRUCTURA_OFICIAL = {
            "INGRESOS": { // Nivel 1 [cite: 5]
                "SUELDO": ["MENSUAL ADULTO 1", "MENSUAL ADULTO 2"], // Nivel 2 y 3 [cite: 6, 7]
                "EXTRAS": ["BONOS/REGALOS", "INGRESOS POR VENTAS"] // [cite: 8, 9]
            },
            "GASTOS": { // 
                "INMUEBLE 1": ["HIPOTECA", "IMPUESTOS", "ADMINISTRACIÓN", "MANTENIMIENTO", "OTROS"], // [cite: 11-16]
                "INMUEBLE 2": ["HIPOTECA", "IMPUESTOS", "ADMINISTRACIÓN", "MANTENIMIENTO", "OTROS"], // [cite: 17-22]
                "SERVICIOS": ["ELECTRICIDAD", "AGUA", "GAS", "TELEFONOS", "APP O SUSCRIPCIONES", "INTERNET / TV", "OTROS"], // [cite: 23-30]
                "ALIMENTACIÓN": ["MERCADOS", "RESTAURANTES", "CAFÉ/MERIENDA", "CIGARRILLOS", "OTROS"], // [cite: 31-36]
                "TRANSPORTE": ["BUSES/TRENES", "CUOTA AUTOMÓVIL 1", "CUOTA AUTOMÓVIL 2", "GASOLINA", "PEAJES", "IMPUESTOS", "MANTENIMIENTO", "SEGUROS", "PARQUEADORES", "OTROS"], // [cite: 37-47]
                "HIJOS": ["COLEGIOS", "MATRÍCULAS ESCOLARES", "ACTIVIDADES EXTRA", "MESADA", "ÚTILES ESCOLARES", "REGALOS Y FIESTAS", "CLASES EXTRA", "TERAPIAS/OTROS", "AYUDA DOMÉSTICA", "TRANSPORTE ESCOLAR", "VIAJES ESCOLARES", "CUOTA ALIMENTARIA", "OTROS"], // [cite: 48-61]
                "EDUCACIÓN ADULTOS": ["OTRO"], // [cite: 62]
                "SALUD": ["SEGURO MÉDICO", "DENTISTA", "MEDICINAS", "PAGOS NO CUBIERTOS POR SEGURO", "OTROS"], // [cite: 63-68]
                "MASCOTAS": ["SEGURO", "COMIDA", "CUIDADOS", "OTROS"], // [cite: 69-73]
                "VESTUARIO": ["UNIFORMES HIJOS", "ROPA HIJOS", "ROPA ADULTOS", "IMPLEMENTOS DEPORTIVOS", "SALÓN DE BELLEZA", "PELUQUERÍA", "COSMÉTICOS", "OTROS"], // [cite: 74-82]
                "OTROS GASTOS": ["REGALOS", "FIESTAS Y CELEBRACIONES", "VACACIONES", "SALIDAS FIN DE SEMANA", "AYUDA A PARIENTES", "DONACIONES", "HOBBIES/PASATIEMPOS", "GASTOS MISCELÁNEOS"], // [cite: 83-91]
                "SEGUROS": ["SEGURO MÉDICO", "SEGURO DENTÍSTA", "SEGURO DE VIDA", "SEGURO MORTUORIO", "OTROS SEGUROS"], // [cite: 92-97]
                "DEUDAS": ["TARJETA DE CRÉDITO 1", "TARJETA DE CRÉDITO 2", "TARJETA DE CRÉDITO 3", "OTRA DEUDA 1", "OTRA DEUDA 2", "DEUDAS FAMILIARES", "DEUDA CON LA EMPRESA", "CRÉDITO DE EDUCACIÓN"] // 
            }
        };

        let db = JSON.parse(localStorage.getItem('elite_v9_data')) || {
            movimientos: [],
            activos: [
                { nombre: "Inmueble Principal", valor: 0, deuda: 0 },
                { nombre: "Vehículo Familiar", valor: 0, deuda: 0 }
            ]
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active-nav');
            render();
        }

        function render() {
            const select = document.getElementById('reg-cat');
            if(select.innerHTML === "") {
                for (const [principal, secundarias] of Object.entries(ESTRUCTURA_OFICIAL)) {
                    for (const [secundaria, subcats] of Object.entries(secundarias)) {
                        subcats.forEach(sub => {
                            let opt = document.createElement('option');
                            opt.value = `${principal}|${secundaria}|${sub}`;
                            opt.textContent = `${principal} > ${secundaria} > ${sub}`;
                            select.appendChild(opt);
                        });
                    }
                }
            }

            let tIng = 0, tGas = 0, tDeu = 0, tValAct = 0;
            const resPrincipal = { "INGRESOS": 0, "GASTOS": 0 };
            const resSecundaria = {};

            db.movimientos.forEach(m => {
                const [p, s, sub] = m.catPath.split('|');
                resPrincipal[p] += m.monto;
                if(!resSecundaria[s]) resSecundaria[s] = 0;
                resSecundaria[s] += m.monto;
                if(p === "INGRESOS") tIng += m.monto; else tGas += m.monto;
            });

            db.activos.forEach(a => { tValAct += a.valor; tDeu += a.deuda; });

            // Dashboard
            document.getElementById('total-ingresos').innerText = `$${tIng.toLocaleString()}`;
            document.getElementById('total-gastos').innerText = `$${tGas.toLocaleString()}`;
            document.getElementById('total-deuda').innerText = `$${tDeu.toLocaleString()}`;
            document.getElementById('total-patrimonio').innerText = `$${(tValAct - tDeu + (tIng - tGas)).toLocaleString()}`;
            document.getElementById('flujo-mes').innerText = `$${(tIng - tGas).toLocaleString()}`;
            document.getElementById('flujo-mes').className = (tIng - tGas) >= 0 ? 'text-emerald-500 font-black text-xl' : 'text-red-500 font-black text-xl';

            const containerDash = document.getElementById('resumen-estructura');
            containerDash.innerHTML = '';
            for (const [p, valP] of Object.entries(resPrincipal)) {
                let html = `<div class="mb-6"><div class="cat-principal p-2 mb-2 text-xs">${p} - TOTAL: $${valP.toLocaleString()}</div>`;
                for (const [secName, secList] of Object.entries(ESTRUCTURA_OFICIAL[p])) {
                    const montoSec = resSecundaria[secName] || 0;
                    html += `
                        <details class="ml-2 mb-1">
                            <summary class="cat-secundaria flex justify-between cursor-pointer p-1">
                                <span>${secName}</span>
                                <span>$${montoSec.toLocaleString()}</span>
                            </summary>
                            <div class="ml-4 py-1 space-y-1">
                                ${secList.map(sub => {
                                    const mSub = db.movimientos.filter(x => x.catPath.endsWith(sub)).reduce((a,b) => a+b.monto, 0);
                                    return `<div class="sub-categoria flex justify-between border-b border-slate-50"><span>${sub}</span><span>$${mSub.toLocaleString()}</span></div>`;
                                }).join('')}
                            </div>
                        </details>`;
                }
                html += `</div>`;
                containerDash.innerHTML += html;
            }

            // Historial
            const lista = document.getElementById('lista-movimientos');
            lista.innerHTML = db.movimientos.slice(0, 50).map(m => {
                const parts = m.catPath.split('|');
                const color = parts[0] === 'INGRESOS' ? 'text-emerald-500' : 'text-red-500';
                return `<tr>
                    <td class="p-4 text-slate-400 font-bold">${m.fecha}</td>
                    <td class="p-4 font-bold text-slate-700">${parts[2]}<br><span class="text-[9px] text-slate-400">${m.nota || ''}</span></td>
                    <td class="p-4 text-right font-black ${color}">$${m.monto.toLocaleString()}</td>
                </tr>`;
            }).join('');

            // Activos
            const gridAct = document.getElementById('grid-activos');
            gridAct.innerHTML = db.activos.map((a, i) => `
                <div class="bg-white p-5 rounded-3xl border shadow-sm space-y-3">
                    <p class="text-[10px] font-black text-slate-400 uppercase">${a.nombre}</p>
                    <div class="flex justify-between items-center text-xs font-bold"><span>Valor</span><input type="number" value="${a.valor}" onchange="actAct(${i},'valor',this.value)" class="w-24 text-right bg-slate-50 p-1 rounded"></div>
                    <div class="flex justify-between items-center text-xs font-bold"><span>Deuda</span><input type="number" value="${a.deuda}" onchange="actAct(${i},'deuda',this.value)" class="w-24 text-right bg-slate-50 p-1 rounded text-red-500"></div>
                    <div class="pt-2 border-t flex justify-between font-black text-xs"><span>Real</span><span class="text-emerald-500">$${(a.valor-a.deuda).toLocaleString()}</span></div>
                </div>
            `).join('');
        }

        document.getElementById('form-registro').onsubmit = (e) => {
            e.preventDefault();
            db.movimientos.unshift({
                id: Date.now(),
                fecha: document.getElementById('reg-fecha').value,
                monto: parseFloat(document.getElementById('reg-monto').value),
                catPath: document.getElementById('reg-cat').value,
                nota: document.getElementById('reg-nota').value
            });
            save();
            document.getElementById('form-registro').reset();
            setHoy();
            showTab('tab-dash');
        };

        function actAct(i, c, v) { db.activos[i][c] = parseFloat(v) || 0; save(); }
        function agregarActivo() { const n = prompt("Nombre:"); if(n) { db.activos.push({nombre:n, valor:0, deuda:0}); save(); } }
        function save() { localStorage.setItem('elite_v9_data', JSON.stringify(db)); render(); }
        function setHoy() { document.getElementById('reg-fecha').valueAsDate = new Date(); }
        function borrarTodo() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
        function exportarDatos() {
            let csv = "\uFEFFFecha,Path,Monto,Nota\n";
            db.movimientos.forEach(m => csv += `${m.fecha},${m.catPath},${m.monto},"${m.nota}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Elite_Finance_Report.csv`;
            link.click();
        }

        setHoy();
        render();
    </script>
</body>
</html>
