<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Elite | Patrimonio & Activos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png"> 
    
    <style>
        .active-tab { border-bottom: 4px solid #6366f1; color: #6366f1; }
        .bg-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .equity-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
        .equity-fill { height: 100%; background: #10b981; transition: width 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen pb-12">

    <header class="bg-slate-900 text-white shadow-2xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter text-indigo-400">FINANZAS ELITE PRO</h1>
                <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold">Gestión de Patrimonio Real</p>
            </div>
            <div class="flex gap-4 items-center">
                <div class="text-right hidden sm:block">
                    <p class="text-[9px] text-slate-400 uppercase">Patrimonio Neto</p>
                    <p id="totalNeto" class="text-xl font-black text-emerald-400">$0.00</p>
                </div>
                <button onclick="exportarExcel()" class="bg-indigo-600 p-2 rounded-lg hover:bg-indigo-500 transition"><i class="fas fa-file-export"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-6 space-y-8">
        
        <nav class="flex gap-8 border-b border-slate-200 mb-6 font-bold text-xs uppercase tracking-widest text-slate-400">
            <button onclick="switchTab('diario')" id="btn-diario" class="pb-3 active-tab transition-all">Libro Diario</button>
            <button onclick="switchTab('activos')" id="btn-activos" class="pb-3 transition-all">Activos Fijos</button>
            <button onclick="switchTab('config')" id="btn-config" class="pb-3 transition-all">Categorías</button>
        </nav>

        <div id="tab-diario" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-fit">
                <h2 class="text-xs font-black mb-6 uppercase text-slate-400 tracking-widest">Nuevo Registro</h2>
                <form id="formMovimiento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="fecha" class="p-3 bg-slate-50 border rounded-xl outline-none text-sm" required>
                        <input type="number" id="valor" step="0.01" placeholder="Monto $" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold" required>
                    </div>
                    <select id="catSelect" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm font-bold"></select>
                    <input type="text" id="nota" placeholder="Nota o detalle..." class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                    <div class="flex items-center gap-2 p-2">
                        <input type="checkbox" id="recurrente" class="w-4 h-4 rounded text-indigo-600">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Pago Recurrente / Ganchito</label>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-indigo-600 transition uppercase tracking-tighter">Guardar Movimiento</button>
                </form>
            </section>

            <section class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase">Ingresos Mes</span>
                        <span id="res-ing" class="text-lg font-black text-emerald-500">$0</span>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase">Gastos Mes</span>
                        <span id="res-gas" class="text-lg font-black text-red-500">$0</span>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[9px] uppercase font-black text-slate-400">
                            <tr><th class="p-4">Fecha</th><th class="p-4">Categoría</th><th class="p-4 text-right">Monto</th></tr>
                        </thead>
                        <tbody id="historialBody" class="text-sm divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="tab-activos" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="contenedorActivos">
                </div>
            <button onclick="nuevoActivo()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-indigo-700">+ Agregar Nuevo Activo</button>
        </div>

        <div id="tab-config" class="hidden bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <h3 class="text-sm font-black uppercase text-slate-400 mb-6 tracking-widest">Personalizar Categorías</h3>
            <div class="flex gap-4 mb-8">
                <input type="text" id="nuevaCatNombre" placeholder="Nombre de categoría..." class="flex-grow p-3 bg-slate-50 border rounded-xl outline-none">
                <select id="nuevaCatTipo" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold">
                    <option value="ingreso">Ingreso</option>
                    <option value="gasto">Gasto</option>
                </select>
                <button onclick="agregarCategoria()" class="bg-slate-900 text-white px-8 rounded-xl font-bold uppercase text-xs">Añadir</button>
            </div>
            <div id="listaCategoriasConfig" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

    </main>

    <script>
        // --- BASE DE DATOS INICIAL ---
        let appData = JSON.parse(localStorage.getItem('elite_v6')) || {
            movimientos: [],
            activos: [
                { id: 1, nombre: 'Inmueble 1', valor: 250000, deuda: 120000 },
                { id: 2, nombre: 'Inmueble 2', valor: 180000, deuda: 45000 },
                { id: 3, nombre: 'Automóvil 1', valor: 35000, deuda: 8000 }
            ],
            categorias: [
                { id: 1, nombre: 'Salario', tipo: 'ingreso' },
                { id: 2, nombre: 'Ventas', tipo: 'ingreso' },
                { id: 3, nombre: 'Hipoteca', tipo: 'gasto' },
                { id: 4, nombre: 'Alimentación', tipo: 'gasto' },
                { id: 5, nombre: 'Salud', tipo: 'gasto' }
            ]
        };

        // --- MANEJO DE PANTALLAS ---
        function switchTab(tab) {
            ['diario', 'activos', 'config'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('active-tab');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
            render();
        }

        // --- LÓGICA DE MOVIMIENTOS ---
        document.getElementById('formMovimiento').onsubmit = (e) => {
            e.preventDefault();
            const mov = {
                id: Date.now(),
                fecha: document.getElementById('fecha').value,
                valor: parseFloat(document.getElementById('valor').value),
                cat: document.getElementById('catSelect').value,
                nota: document.getElementById('nota').value,
                recurrente: document.getElementById('recurrente').checked
            };
            appData.movimientos.unshift(mov);
            guardar();
        };

        // --- LÓGICA DE ACTIVOS ---
        function nuevoActivo() {
            const nombre = prompt("Nombre del Activo (ej: Casa Playa):");
            const valor = parseFloat(prompt("Valor Comercial Actual:"));
            const deuda = parseFloat(prompt("Deuda Hipotecaria Actual:"));
            if(nombre && valor >= 0) {
                appData.activos.push({ id: Date.now(), nombre, valor, deuda });
                guardar();
            }
        }

        function editarActivo(id) {
            const act = appData.activos.find(a => a.id === id);
            const nValor = prompt("Nuevo Valor Comercial:", act.valor);
            const nDeuda = prompt("Nueva Deuda:", act.deuda);
            if(nValor) act.valor = parseFloat(nValor);
            if(nDeuda) act.deuda = parseFloat(nDeuda);
            guardar();
        }

        // --- LÓGICA DE CATEGORÍAS ---
        function agregarCategoria() {
            const nombre = document.getElementById('nuevaCatNombre').value;
            const tipo = document.getElementById('nuevaCatTipo').value;
            if(nombre) {
                appData.categorias.push({ id: Date.now(), nombre, tipo });
                document.getElementById('nuevaCatNombre').value = '';
                guardar();
            }
        }

        function eliminarCat(id) {
            appData.categorias = appData.categorias.filter(c => c.id !== id);
            guardar();
        }

        // --- RENDERIZADO GENERAL ---
        function render() {
            // Actualizar Select de Categorías
            const select = document.getElementById('catSelect');
            select.innerHTML = appData.categorias.map(c => `<option value="${c.nombre}">${c.nombre} (${c.tipo})</option>`).join('');

            // Historial
            const hist = document.getElementById('historialBody');
            let tIng = 0, tGas = 0;
            hist.innerHTML = appData.movimientos.map(m => {
                const tipo = appData.categorias.find(c => c.nombre === m.cat)?.tipo;
                if(tipo === 'ingreso') tIng += m.valor; else tGas += m.valor;
                return `<tr>
                    <td class="p-4 text-[10px] font-bold text-slate-400">${m.fecha}</td>
                    <td class="p-4 font-bold text-slate-700">${m.cat} ${m.recurrente ? '✅' : ''}</td>
                    <td class="p-4 text-right font-black ${tipo === 'ingreso' ? 'text-emerald-500' : 'text-red-500'}">$${m.valor.toLocaleString()}</td>
                </tr>`;
            }).join('');

            document.getElementById('res-ing').innerText = `$${tIng.toLocaleString()}`;
            document.getElementById('res-gas').innerText = `$${tGas.toLocaleString()}`;

            // Activos Visuales
            const contActivos = document.getElementById('contenedorActivos');
            let tAct = 0, tDeu = 0;
            contActivos.innerHTML = appData.activos.map(a => {
                const equity = a.valor - a.deuda;
                const porcentaje = (equity / a.valor) * 100;
                tAct += a.valor; tDeu += a.deuda;
                return `
                <div class="bg-white p-6 rounded-3xl border shadow-sm relative overflow-hidden group">
                    <button onclick="editarActivo(${a.id})" class="absolute top-4 right-4 text-slate-300 hover:text-indigo-600"><i class="fas fa-edit"></i></button>
                    <h4 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-tighter">${a.nombre}</h4>
                    <div class="flex justify-between items-end mb-2">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase">Equity (Valor Real)</p><p class="text-xl font-black text-slate-800">$${equity.toLocaleString()}</p></div>
                        <div class="text-right text-[10px] font-bold text-emerald-500">${porcentaje.toFixed(0)}% Propio</div>
                    </div>
                    <div class="equity-bar mb-4"><div class="equity-fill" style="width: ${porcentaje}%"></div></div>
                    <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400">
                        <span>Valor: $${a.valor.toLocaleString()}</span>
                        <span class="text-red-400">Deuda: $${a.deuda.toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('totalNeto').innerText = `$${(tAct - tDeu + (tIng - tGas)).toLocaleString()}`;

            // Lista Configuración
            const listConf = document.getElementById('listaCategoriasConfig');
            listConf.innerHTML = appData.categorias.map(c => `
                <div class="bg-slate-50 p-2 rounded-lg flex justify-between items-center text-[10px] font-bold">
                    <span>${c.nombre} (${c.tipo[0].toUpperCase()})</span>
                    <button onclick="eliminarCat(${c.id})" class="text-red-400"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        function guardar() {
            localStorage.setItem('elite_v6', JSON.stringify(appData));
            render();
        }

        function exportarExcel() {
            let csv = "\uFEFFFecha,Detalle,Monto\n";
            appData.movimientos.forEach(m => csv += `${m.fecha},${m.cat} - ${m.nota},${m.valor}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Reporte_Elite_v6.csv`;
            link.click();
        }

        function borrarTodo() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }

        document.getElementById('fecha').valueAsDate = new Date();
        render();
    </script>
</body>
</html>
