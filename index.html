<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Finance Pro v12</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f1f5f9; 
        }

        /* ESTÉTICA MODERNIZADA (Inspirada en Word pero refinada) */
        .cat-principal { 
            background: #fefce8; /* Amarillo muy sutil */
            border-left: 4px solid #facc15; 
            color: #854d0e;
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .cat-secundaria { 
            color: #2563eb; /* Azul corporativo */
            font-weight: 700; 
            font-size: 0.85rem;
        }
        
        .sub-categoria { 
            color: #475569; 
            font-size: 10px; 
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Navegación */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active-nav { 
            color: #4f46e5; 
            border-bottom: 3px solid #4f46e5;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        details > summary { list-style: none; outline: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-4xl mx-auto px-6 py-5">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-black tracking-tighter text-indigo-400 italic">ELITE FINANCE</h1>
                    <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500">Sistema Patrimonial v12</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportarCSV()" class="bg-white/10 p-2.5 rounded-xl text-xs hover:bg-white/20"><i class="fas fa-file-csv"></i></button>
                    <button onclick="resetApp()" class="bg-red-500/10 p-2.5 rounded-xl text-xs text-red-400 hover:bg-red-500/20"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div onclick="abrirDesglose('patrimonio')" class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-2xl cursor-pointer hover:bg-indigo-500/20 transition active:scale-95">
                    <p class="text-[10px] font-bold text-indigo-300 uppercase mb-1">Patrimonio Neto <i class="fas fa-chevron-right ml-1 opacity-50"></i></p>
                    <p id="val-patrimonio" class="text-2xl font-black text-white">$0.00</p>
                </div>
                <div onclick="abrirDesglose('deudas')" class="bg-amber-500/10 border border-amber-500/20 p-4 rounded-2xl cursor-pointer hover:bg-amber-500/20 transition active:scale-95">
                    <p class="text-[10px] font-bold text-amber-300 uppercase mb-1">Deuda Total <i class="fas fa-chevron-right ml-1 opacity-50"></i></p>
                    <p id="val-deuda" class="text-2xl font-black text-white">$0.00</p>
                </div>
            </div>
        </div>

        <nav class="bg-white flex justify-around border-t border-slate-200">
            <button onclick="changeTab('tab-resumen', this)" class="nav-btn py-4 px-2 text-[10px] font-black uppercase text-slate-400 active-nav">Resumen</button>
            <button onclick="changeTab('tab-registro', this)" class="nav-btn py-4 px-2 text-[10px] font-black uppercase text-slate-400">Registrar</button>
            <button onclick="changeTab('tab-activos', this)" class="nav-btn py-4 px-2 text-[10px] font-black uppercase text-slate-400">Activos</button>
            <button onclick="changeTab('tab-historial', this)" class="nav-btn py-4 px-2 text-[10px] font-black uppercase text-slate-400">Historial</button>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-4 sm:p-6">

        <div id="tab-resumen" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Ingresos por Categoría</h3>
                    <div class="h-48 flex justify-center"><canvas id="chartI"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Gastos por Categoría</h3>
                    <div class="h-48 flex justify-center"><canvas id="chartG"></canvas></div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <details open>
                    <summary class="flex justify-between items-center p-6 cursor-pointer bg-slate-800 text-white">
                        <div>
                            <span class="text-[10px] font-bold text-indigo-300 uppercase block mb-1">Flujo de Caja Neto</span>
                            <span id="val-flujo" class="text-2xl font-black leading-none">$0.00</span>
                        </div>
                        <i class="fas fa-layer-group text-slate-500"></i>
                    </summary>
                    <div id="lista-flujo" class="p-4 space-y-4 bg-slate-50">
                        </div>
                </details>
            </div>
        </div>

        <div id="tab-registro" class="tab-content max-w-xl mx-auto">
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-slate-200">
                <h2 class="text-lg font-black text-slate-800 mb-8 text-center uppercase tracking-tighter">Registrar Operación</h2>
                <form id="form-movimiento" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Fecha</label>
                            <input type="date" id="input-fecha" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 focus:border-indigo-500 outline-none transition" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Monto</label>
                            <input type="number" id="input-monto" step="0.01" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-indigo-600 text-xl focus:border-indigo-500 outline-none transition" placeholder="0.00" required>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Categoría</label>
                        <select id="input-cat" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 appearance-none focus:border-indigo-500 outline-none transition" required></select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Descripción corta</label>
                        <input type="text" id="input-nota" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-slate-600 focus:border-indigo-500 outline-none transition" placeholder="Ej: Compra supermercado">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition active:scale-95 uppercase tracking-widest">Confirmar Registro</button>
                </form>
            </div>
        </div>

        <div id="tab-activos" class="tab-content space-y-6">
            <div id="grid-activos" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            <button onclick="nuevoActivo()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-slate-800 transition">+ Añadir Activo / Deuda Fija</button>
        </div>

        <div id="tab-historial" class="tab-content">
            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <div id="lista-historial" class="divide-y divide-slate-100">
                    </div>
            </div>
        </div>

    </main>

    <div id="modal-box" class="fixed inset-0 bg-slate-900/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="font-black text-xs uppercase text-slate-500 tracking-widest">Detalle</h3>
                <button onclick="cerrarModal()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times-circle text-3xl"></i></button>
            </div>
            <div id="modal-body" class="p-8 max-h-[50vh] overflow-y-auto space-y-4"></div>
            <div class="p-6 bg-slate-50 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Elite Finance System</p>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & ESTRUCTURA ---
        const CONFIG = {
            "INGRESOS": {
                "PRINCIPAL": ["MENSUAL ADULTO 1", "MENSUAL ADULTO 2"],
                "EXTRAS": ["BONOS/REGALOS", "INGRESOS POR VENTAS"]
            },
            "GASTOS": {
                "INMUEBLES": ["HIPOTECA", "IMPUESTOS", "ADMINISTRACIÓN", "MANTENIMIENTO", "OTROS"],
                "SERVICIOS": ["ELECTRICIDAD", "AGUA", "GAS", "TELEFONOS", "APP O SUSCRIPCIONES", "INTERNET / TV", "OTROS"],
                "ALIMENTACIÓN": ["MERCADOS", "RESTAURANTES", "CAFÉ/MERIENDA", "CIGARRILLOS", "OTROS"],
                "TRANSPORTE": ["BUS/TREN", "CUOTA AUTO", "GASOLINA", "PEAJES", "SEGUROS", "MANTENIMIENTO", "PARQUEADORES", "OTROS"],
                "FAMILIA": ["COLEGIOS", "MATRÍCULAS", "ACTIVIDADES", "MESADA", "ÚTILES", "REGALOS", "SALUD", "MASCOTAS", "VESTUARIO", "OTROS"]
            }
        };

        let storage = JSON.parse(localStorage.getItem('elite_v12_db')) || {
            movs: [],
            activos: [
                { id: 1, n: "Casa Principal", v: 0, d: 0 },
                { id: 2, n: "Vehículo", v: 0, d: 0 },
                { id: 3, n: "Efectivo/Ahorros", v: 0, d: 0 }
            ]
        };

        let charts = { i: null, g: null };

        // --- NAVEGACIÓN (SISTEMA CORREGIDO) ---
        function changeTab(id, btn) {
            // Ocultar todos
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            
            // Mostrar seleccionado
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-nav');
            
            // Refrescar datos
            actualizarInterfaz();
            window.scrollTo(0,0);
        }

        // --- LÓGICA DE NEGOCIO ---
        function actualizarInterfaz() {
            let tIng = 0, tGas = 0, tDeu = 0, tVal = 0;
            const resI = {}, resG = {};

            // Procesar Movimientos
            storage.movs.forEach(m => {
                const [p, s] = m.path.split('|');
                if(p === "INGRESOS") {
                    tIng += m.val;
                    resI[s] = (resI[s] || 0) + m.val;
                } else {
                    tGas += m.val;
                    resG[s] = (resG[s] || 0) + m.val;
                }
            });

            // Procesar Activos
            storage.activos.forEach(a => { tVal += a.v; tDeu += a.d; });

            // Actualizar Cabecera
            const flujo = tIng - tGas;
            document.getElementById('val-patrimonio').innerText = `$${(tVal - tDeu + flujo).toLocaleString()}`;
            document.getElementById('val-deuda').innerText = `$${tDeu.toLocaleString()}`;
            document.getElementById('val-flujo').innerText = `$${flujo.toLocaleString()}`;
            document.getElementById('val-flujo').className = flujo >= 0 ? 'text-2xl font-black text-emerald-400' : 'text-2xl font-black text-red-400';

            // Actualizar Gráficos
            renderCharts(resI, resG);

            // Renderizar Lista Flujo (Estilo Word)
            renderFlujoLista();

            // Renderizar Activos
            renderActivos();

            // Renderizar Historial
            renderHistorial();

            // Cargar select si está vacío
            const select = document.getElementById('input-cat');
            if(select.innerHTML === "") {
                for(let p in CONFIG) {
                    for(let s in CONFIG[p]) {
                        CONFIG[p][s].forEach(sub => {
                            let o = document.createElement('option');
                            o.value = `${p}|${s}|${sub}`;
                            o.textContent = `${p} > ${s} > ${sub}`;
                            select.appendChild(o);
                        });
                    }
                }
            }
        }

        function renderFlujoLista() {
            const container = document.getElementById('lista-flujo');
            container.innerHTML = '';
            
            for(let p in CONFIG) {
                const totalP = storage.movs.filter(m => m.path.startsWith(p)).reduce((acc, curr) => acc + curr.val, 0);
                let html = `<div class="cat-principal p-3 rounded-lg mb-2 shadow-sm">${p} - Total: $${totalP.toLocaleString()}</div>`;
                
                for(let s in CONFIG[p]) {
                    const totalS = storage.movs.filter(m => m.path.includes(s)).reduce((acc, curr) => acc + curr.val, 0);
                    html += `
                    <details class="ml-2 mb-2 bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                        <summary class="cat-secundaria p-4 flex justify-between cursor-pointer hover:bg-slate-50">
                            <span>${s}</span>
                            <span class="font-black">$${totalS.toLocaleString()}</span>
                        </summary>
                        <div class="p-4 bg-slate-50/50 space-y-2 border-t border-slate-100">
                            ${CONFIG[p][s].map(sub => {
                                const totalSub = storage.movs.filter(m => m.path.endsWith(sub)).reduce((acc, curr) => acc + curr.val, 0);
                                return `<div class="sub-categoria flex justify-between py-1 border-b border-white">
                                    <span>${sub}</span>
                                    <span class="font-bold text-slate-800">$${totalSub.toLocaleString()}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </details>`;
                }
                container.innerHTML += html;
            }
        }

        function renderActivos() {
            const container = document.getElementById('grid-activos');
            container.innerHTML = storage.activos.map((a, i) => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm relative overflow-hidden">
                    <button onclick="borrarAct(${i})" class="absolute top-4 right-4 text-slate-200 hover:text-red-400 transition"><i class="fas fa-trash text-xs"></i></button>
                    <p class="text-[9px] font-black text-slate-400 mb-4 uppercase tracking-[0.2em]">${a.n}</p>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center text-xs font-bold">
                            <span class="text-slate-500">VALOR</span>
                            <input type="number" value="${a.v}" onchange="updAct(${i},'v',this.value)" class="w-24 text-right bg-slate-50 p-2 rounded-xl font-black text-slate-700 outline-none">
                        </div>
                        <div class="flex justify-between items-center text-xs font-bold">
                            <span class="text-red-400">DEUDA</span>
                            <input type="number" value="${a.d}" onchange="updAct(${i},'d',this.value)" class="w-24 text-right bg-slate-50 p-2 rounded-xl font-black text-red-500 outline-none">
                        </div>
                        <div class="pt-4 border-t flex justify-between items-center font-black">
                            <span class="text-[10px] text-slate-400 uppercase">REAL</span>
                            <span class="text-indigo-600 text-lg">$${(a.v - a.d).toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderHistorial() {
            const container = document.getElementById('lista-historial');
            container.innerHTML = storage.movs.length ? storage.movs.slice(0, 30).map((m, i) => `
                <div class="p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-xs ${m.path.startsWith('ING') ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas ${m.path.startsWith('ING') ? 'fa-arrow-up' : 'fa-arrow-down'}"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${m.fecha}</p>
                            <p class="font-black text-xs text-slate-800">${m.path.split('|')[2]}</p>
                            <p class="text-[10px] text-slate-400 italic truncate w-32">${m.nota || '-'}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${m.path.startsWith('ING') ? 'text-emerald-600' : 'text-red-600'}">$${m.val.toLocaleString()}</p>
                        <button onclick="borrarMov(${i})" class="text-[9px] font-bold text-slate-300 hover:text-red-500 transition uppercase">Borrar</button>
                    </div>
                </div>
            `).join('') : '<p class="p-10 text-center text-slate-400 text-xs italic">No hay registros aún.</p>';
        }

        function renderCharts(dataI, dataG) {
            const opt = { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } }, 
                cutout: '80%' 
            };
            
            if(charts.i) charts.i.destroy();
            if(charts.g) charts.g.destroy();

            charts.i = new Chart(document.getElementById('chartI'), {
                type: 'doughnut',
                data: { labels: Object.keys(dataI), datasets: [{ data: Object.values(dataI), backgroundColor: ['#6366f1','#818cf8','#a5b4fc'], borderWidth: 0 }] },
                options: opt
            });

            charts.g = new Chart(document.getElementById('chartG'), {
                type: 'doughnut',
                data: { labels: Object.keys(dataG), datasets: [{ data: Object.values(dataG), backgroundColor: ['#ef4444','#f87171','#fb7185','#fca5a5','#fcd34d'], borderWidth: 0 }] },
                options: opt
            });
        }

        // --- ACCIONES ---
        document.getElementById('form-movimiento').onsubmit = (e) => {
            e.preventDefault();
            storage.movs.unshift({
                fecha: document.getElementById('input-fecha').value,
                val: parseFloat(document.getElementById('input-monto').value),
                path: document.getElementById('input-cat').value,
                nota: document.getElementById('input-nota').value
            });
            guardar();
            document.getElementById('form-movimiento').reset();
            setHoy();
            changeTab('tab-resumen', document.querySelector('.nav-btn'));
        };

        function updAct(i, prop, val) { storage.activos[i][prop] = parseFloat(val) || 0; guardar(); }
        function nuevoActivo() { const n = prompt("Nombre del Activo/Deuda:"); if(n) { storage.activos.push({id: Date.now(), n: n.toUpperCase(), v: 0, d: 0}); guardar(); } }
        function borrarAct(i) { if(confirm("¿Eliminar este ítem de activos?")) { storage.activos.splice(i, 1); guardar(); } }
        function borrarMov(i) { if(confirm("¿Eliminar este registro?")) { storage.movs.splice(i, 1); guardar(); } }
        
        function abrirDesglose(tipo) {
            document.getElementById('modal-box').classList.remove('hidden');
            const body = document.getElementById('modal-body');
            body.innerHTML = '';
            
            if(tipo === 'patrimonio') {
                document.getElementById('modal-title').innerText = "Cálculo de Patrimonio";
                storage.activos.forEach(a => {
                    body.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <span class="text-xs font-bold text-slate-500">${a.n}</span>
                            <span class="font-black text-indigo-600">$${(a.v - a.d).toLocaleString()}</span>
                        </div>`;
                });
            } else {
                document.getElementById('modal-title').innerText = "Desglose de Pasivos";
                storage.activos.filter(a => a.d > 0).forEach(a => {
                    body.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-red-50 rounded-2xl border border-red-100">
                            <span class="text-xs font-bold text-red-800">${a.n}</span>
                            <span class="font-black text-red-600">$${a.d.toLocaleString()}</span>
                        </div>`;
                });
            }
        }

        function cerrarModal() { document.getElementById('modal-box').classList.add('hidden'); }
        function guardar() { localStorage.setItem('elite_v12_db', JSON.stringify(storage)); actualizarInterfaz(); }
        function setHoy() { document.getElementById('input-fecha').valueAsDate = new Date(); }
        function resetApp() { if(confirm("¿Deseas BORRAR TODO y empezar de cero?")) { localStorage.clear(); location.reload(); } }
        
        function exportarCSV() {
            let csv = "\uFEFFFecha,Categoría,Monto,Nota\n";
            storage.movs.forEach(m => csv += `${m.fecha},${m.path},${m.val},"${m.nota}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Elite_Finance_Export.csv`;
            link.click();
        }

        // --- INICIO ---
        setHoy();
        actualizarInterfaz();
    </script>
</body>
</html>
