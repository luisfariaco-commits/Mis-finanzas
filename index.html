<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzApp Pro | Sistema Contable Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-10">

    <nav class="bg-slate-900 text-white p-6 shadow-2xl border-b-4 border-indigo-500 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black tracking-tight"><i class="fas fa-chart-line mr-2 text-indigo-400"></i>FINANZAS PRO</h1>
                <div class="space-x-2">
                    <button onclick="configurarMeta()" class="text-xs bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg transition font-bold uppercase tracking-wider">
                        <i class="fas fa-bullseye mr-1"></i> Meta
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Saldo Neto</p>
                    <p id="saldoTotal" class="text-xl font-bold text-indigo-300">$0.00</p>
                </div>
                <div class="bg-green-500/10 p-3 rounded-xl border border-green-500/20">
                    <p class="text-[10px] uppercase text-green-400 font-bold">Ingresos</p>
                    <p id="ingresosMes" class="text-xl font-bold text-green-400">$0.00</p>
                </div>
                <div class="bg-red-500/10 p-3 rounded-xl border border-red-500/20">
                    <p class="text-[10px] uppercase text-red-400 font-bold">Gastos</p>
                    <p id="gastosMes" class="text-xl font-bold text-red-400">$0.00</p>
                </div>
                <div class="bg-indigo-500/10 p-3 rounded-xl border border-indigo-500/20">
                    <p class="text-[10px] uppercase text-indigo-300 font-bold">Logro Meta</p>
                    <p id="porcentajeMeta" class="text-xl font-bold text-indigo-300">0%</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 space-y-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-800 italic">Asiento Contable</h2>
                    <button onclick="exportarExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-4 py-2 rounded-lg font-bold transition">
                        <i class="fas fa-file-excel mr-2"></i>DESCARGAR EXCEL
                    </button>
                </div>
                <form id="financeForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">MONTO ($)</label>
                        <input type="number" id="monto" placeholder="0.00" step="0.01" class="p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">DESCRIPCIÓN</label>
                        <input type="text" id="desc" placeholder="Concepto del gasto/ingreso" class="p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">TIPO</label>
                        <select id="tipo" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold">
                            <option value="gasto">GASTO (-)</option>
                            <option value="ingreso">INGRESO (+)</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">CATEGORÍA</label>
                        <select id="categoria" class="p-3 bg-slate-50 border rounded-xl outline-none">
                            <option value="Vivienda">Vivienda</option>
                            <option value="Alimentación">Alimentación</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Sueldo/Ventas">Ingresos Laborales</option>
                            <option value="Deuda">Pago de Deuda (Pasivo)</option>
                            <option value="Inversión">Inversión (Activo)</option>
                            <option value="Ocio">Ocio / Otros</option>
                        </select>
                    </div>
                    <button type="submit" class="sm:col-span-2 bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-800 transition uppercase tracking-widest shadow-lg active:scale-95">
                        Registrar en Libro Diario
                    </button>
                </form>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 flex flex-col items-center justify-center">
                <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Distribución de Gastos</h3>
                <div class="relative w-full">
                    <canvas id="gastosChart"></canvas>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <h3 class="font-black text-slate-700 uppercase text-xs tracking-widest">Historial Temporal</h3>
                <button onclick="borrarTodo()" class="text-red-400 text-[10px] font-bold hover:text-red-600 transition uppercase">Borrar Datos</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 text-slate-500 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Fecha</th>
                            <th class="p-4">Detalle</th>
                            <th class="p-4 text-right">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="listaTransacciones" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // Lógica de Persistencia y Contabilidad
        let transacciones = JSON.parse(localStorage.getItem('finanzas_v3')) || [];
        let myChart;

        const form = document.getElementById('financeForm');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const nueva = {
                id: Date.now(),
                monto: parseFloat(document.getElementById('monto').value),
                desc: document.getElementById('desc').value,
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value,
                fecha: new Date().toLocaleString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
            };
            transacciones.unshift(nueva);
            localStorage.setItem('finanzas_v3', JSON.stringify(transacciones));
            form.reset();
            actualizarUI();
        });

        function configurarMeta() {
            const meta = prompt("Define tu objetivo de ahorro mensual ($):", "1000");
            if(meta) {
                localStorage.setItem('metaAhorro', meta);
                actualizarUI();
            }
        }

        function actualizarUI() {
            const lista = document.getElementById('listaTransacciones');
            lista.innerHTML = '';
            let ing = 0, gas = 0;
            const cats = {};

            transacciones.forEach(t => {
                if(t.tipo === 'ingreso') {
                    ing += t.monto;
                } else {
                    gas += t.monto;
                    cats[t.categoria] = (cats[t.categoria] || 0) + t.monto;
                }
                
                lista.innerHTML += `
                    <tr class="hover:bg-indigo-50/30 transition">
                        <td class="p-4 text-slate-400 text-[11px] font-medium">${t.fecha}</td>
                        <td class="p-4">
                            <p class="font-bold text-slate-700 leading-tight">${t.desc}</p>
                            <p class="text-[10px] text-indigo-500 uppercase font-bold">${t.categoria}</p>
                        </td>
                        <td class="p-4 text-right font-black ${t.tipo === 'ingreso' ? 'text-green-500' : 'text-red-500'}">
                            ${t.tipo === 'ingreso' ? '+' : '-'}$${t.monto.toLocaleString('es-ES', {minimumFractionDigits: 2})}
                        </td>
                    </tr>`;
            });

            const saldo = ing - gas;
            const meta = parseFloat(localStorage.getItem('metaAhorro')) || 1;
            const progreso = Math.max(0, Math.min((saldo / meta) * 100, 100));

            document.getElementById('saldoTotal').innerText = `$${saldo.toLocaleString('es-ES', {minimumFractionDigits: 2})}`;
            document.getElementById('ingresosMes').innerText = `$${ing.toLocaleString('es-ES', {minimumFractionDigits: 2})}`;
            document.getElementById('gastosMes').innerText = `$${gas.toLocaleString('es-ES', {minimumFractionDigits: 2})}`;
            document.getElementById('porcentajeMeta').innerText = `${Math.round(progreso)}%`;

            actualizarGrafico(cats);
        }

        function actualizarGrafico(datos) {
            const ctx = document.getElementById('gastosChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            if(Object.keys(datos).length === 0) return;

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(datos),
                    datasets: [{
                        data: Object.values(datos),
                        backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '75%',
                    plugins: { legend: { display: false } } 
                }
            });
        }

        function exportarExcel() {
            if(transacciones.length === 0) return alert("No hay datos para exportar");
            let csv = "\uFEFFFecha,Descripcion,Categoria,Tipo,Monto\n";
            transacciones.forEach(t => {
                csv += `"${t.fecha}","${t.desc}","${t.categoria}","${t.tipo}",${t.monto}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Contabilidad_Personal_${new Date().toISOString().slice(0,10)}.csv`);
            link.click();
        }

        function borrarTodo() {
            if(confirm("¿Seguro? Se borrarán todos tus registros contables.")) {
                localStorage.removeItem('finanzas_v3');
                transacciones = [];
                actualizarUI();
            }
        }

        // Iniciar App
        actualizarUI();
    </script>
</body>
</html>
