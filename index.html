<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Elite Finance 15 - Control Patrimonial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">

<div class="max-w-5xl mx-auto">

<h1 class="text-3xl font-black mb-6">Elite Finance 15</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded shadow">
<h2 class="text-sm font-bold text-slate-500">Patrimonio Neto</h2>
<p id="netWorth" class="text-2xl font-black">$0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="text-sm font-bold text-slate-500">Total Deudas</h2>
<p id="totalDebt" class="text-2xl font-black text-red-600">$0</p>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="text-sm font-bold text-slate-500">Caja Total</h2>
<p id="totalCash" class="text-2xl font-black text-emerald-600">$0</p>
</div>

</div>

<div class="flex gap-4 mb-6 flex-wrap">
<button onclick="seedDemo()" class="bg-indigo-600 text-white px-4 py-2 rounded">Cargar Demo</button>
<button onclick="makeMortgagePayment()" class="bg-emerald-600 text-white px-4 py-2 rounded">Pagar Cuota Hipoteca</button>
<button onclick="simulateProjection()" class="bg-amber-500 text-white px-4 py-2 rounded">Simular 10 Años</button>
<button onclick="resetDB()" class="bg-red-600 text-white px-4 py-2 rounded">Reset</button>
</div>

<div id="projectionResult" class="bg-white p-4 rounded shadow mb-6 hidden"></div>

<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">Detalle Deudas</h2>
<div id="debtDetail"></div>
</div>

</div>

<script>
const STORAGE_KEY = "elite_v15_full";

function loadDB() {
return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
version: 15,
accounts: [],
assets: [],
debts: [],
transactions: []
};
}

function saveDB() {
localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
render();
}

let db = loadDB();

/* ===========================
   UTILIDADES MONETARIAS
=========================== */

function cents(n) { return Math.round(n * 100); }
function dollars(c) { return (c / 100); }
function format(c) { return "$" + dollars(c).toLocaleString(undefined,{minimumFractionDigits:2}); }

/* ===========================
   MÉTRICAS
=========================== */

function netWorth() {
const assets = db.assets.reduce((s,a)=>s+a.marketValueCents,0);
const debts = db.debts.reduce((s,d)=>s+d.principalCents,0);
const cash = db.accounts.reduce((s,a)=>s+a.balanceCents,0);
return assets + cash - debts;
}

/* ===========================
   AMORTIZACIÓN FRANCESA
=========================== */

function monthlyRate(annual) {
return annual/12;
}

function calculatePayment(principalCents, annualRate, months) {
const P = dollars(principalCents);
const r = monthlyRate(annualRate);
const n = months;
const payment = P*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
return cents(payment);
}

function nextMortgageBreakdown(debt) {
const balance = dollars(debt.principalCents);
const r = monthlyRate(debt.annualRate);
const paymentCents = calculatePayment(debt.principalCents,debt.annualRate,debt.termMonths);
const payment = dollars(paymentCents);
const interest = balance*r;
const principal = payment-interest;

return {
totalCents: paymentCents,
interestCents: cents(interest),
principalCents: cents(principal)
};
}

/* ===========================
   TRANSACCIONES
=========================== */

function makeMortgagePayment() {

if(db.debts.length===0) return alert("No hay deuda");

const debt = db.debts[0];
const breakdown = nextMortgageBreakdown(debt);

if(db.accounts[0].balanceCents < breakdown.totalCents) {
return alert("Fondos insuficientes");
}

db.accounts[0].balanceCents -= breakdown.totalCents;
debt.principalCents -= breakdown.principalCents;

db.transactions.push({
type:"debt_payment",
total: breakdown.totalCents,
principal: breakdown.principalCents,
interest: breakdown.interestCents,
date: new Date().toISOString()
});

saveDB();
}

/* ===========================
   PROYECCIÓN 10 AÑOS
=========================== */

function futureValue(initialCents, monthlyCents, annualRate, years) {
const r = annualRate/12;
const n = years*12;
const initial = dollars(initialCents);
const monthly = dollars(monthlyCents);
const fvInitial = initial*Math.pow(1+r,n);
const fvMonthly = monthly*((Math.pow(1+r,n)-1)/r);
return cents(fvInitial+fvMonthly);
}

function simulateProjection() {

const monthlyInvest = prompt("¿Cuánto invertirás mensualmente?");
if(!monthlyInvest) return;

const result = futureValue(
db.accounts[0].balanceCents,
cents(parseFloat(monthlyInvest)),
0.08,
10
);

document.getElementById("projectionResult").classList.remove("hidden");
document.getElementById("projectionResult").innerHTML =
"<h3 class='font-bold'>Proyección 10 años al 8%</h3>"+
"<p class='text-2xl font-black text-indigo-600'>"+format(result)+"</p>";
}

/* ===========================
   RENDER
=========================== */

function render() {

document.getElementById("netWorth").innerText = format(netWorth());

const totalDebt = db.debts.reduce((s,d)=>s+d.principalCents,0);
document.getElementById("totalDebt").innerText = format(totalDebt);

const totalCash = db.accounts.reduce((s,a)=>s+a.balanceCents,0);
document.getElementById("totalCash").innerText = format(totalCash);

let debtHTML = "";

db.debts.forEach(d=>{
debtHTML += "<div class='border p-3 mb-2 rounded'>";
debtHTML += "<p><b>"+d.name+"</b></p>";
debtHTML += "<p>Saldo: "+format(d.principalCents)+"</p>";
debtHTML += "</div>";
});

document.getElementById("debtDetail").innerHTML = debtHTML || "Sin deudas";
}

/* ===========================
   DEMO
=========================== */

function seedDemo() {

db = {
version:15,
accounts:[
{ id:"acc1", name:"Banco Principal", balanceCents:cents(10000) }
],
assets:[
{ id:"house", name:"Casa", marketValueCents:cents(300000) }
],
debts:[
{ id:"mort1", name:"Hipoteca Casa", principalCents:cents(200000), annualRate:0.065, termMonths:300 }
],
transactions:[]
};

saveDB();
}

function resetDB() {
localStorage.removeItem(STORAGE_KEY);
location.reload();
}

render();
</script>

</body>
</html>
